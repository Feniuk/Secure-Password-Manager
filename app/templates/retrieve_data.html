<!doctype html>
<html>
  <head>
    <title>Data Storage</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/"> Password Manager </a>
        <div class="navbar-nav">
          <a class="nav-link" href="/"> Home </a>
          <a class="nav-link" href="/dashboard"> Dashboard </a>
          <a class="nav-link" href="/generate_password"> Generate Password </a>
          <a class="nav-link" href="/store_data"> Store Data </a>
          <a class="nav-link" href="/retrieve_data"> Data Storage </a>
          <a class="nav-link text-danger" href="/logout"> Logout </a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <h1 class="mb-4">Your previously saved data</h1>

      <table class="table table-striped table-bordered">
        <thead>
          <tr>
            <th>Website</th>
            <th>Username</th>
            <th>Password</th>
            <th>Delete</th>
          </tr>
        </thead>

        <tbody>
          {% for entry in entries %}
          <tr>
            <td>{{ entry.website }}</td>
            <td>{{ entry.username }}</td>
            <td>{{ entry.password }}</td>
            <td>
              <a href="/edit/{{ entry.id }}" class="btn btn-warning"> Edit </a>
              <a href="/delete/{{ entry.id }}" class="btn btn-danger btn-sm">
                Delete
              </a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
